default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "password123" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "db" } %>

development:
  <<: *default
  database: rail_test_development

test:
  <<: *default
  database: rail_test_test

production:
  <<: *default
  database: rail_test_production
